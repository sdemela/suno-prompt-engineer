<script>
var apiKey = localStorage.getItem('spe_apikey') || '';
var FREE_LIMIT = 2;

function getTodayKey(){ return 'spe_used_' + new Date().toISOString().slice(0,10); }
function getUsed(){ return parseInt(localStorage.getItem(getTodayKey())||'0',10); }
function incUsed(){ localStorage.setItem(getTodayKey(), String(getUsed()+1)); }

function updateBanner(){
  var u = getUsed(), r = Math.max(0, FREE_LIMIT - u);
  var b = document.getElementById('freeBanner');
  if(localStorage.getItem('spe_apikey')){ b.style.display='none'; return; }
  b.style.display='flex';
  
  // CORREZIONE GRAMMATICALE:
  let testo;
  if (r === 0) {
    testo = '🔒 Limite gratuito raggiunto per oggi';
  } else if (r === 1) {
    testo = '⚡ 1 generazione gratuita oggi';
  } else {
    testo = '⚡ ' + r + ' generazioni gratuite oggi';
  }
  
  document.getElementById('freeCounterText').textContent = testo;
  document.getElementById('usedCount').textContent = Math.min(u, FREE_LIMIT);
}

async function generate() {
  const userKey = localStorage.getItem('spe_apikey');
  if(!userKey && getUsed() >= FREE_LIMIT) {
    alert('Limite raggiunto. Inserisci la tua API Key.');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.innerHTML = '<span class="sp"></span> GENERANDO...';

  const payload = {
    formData: {
      version: document.querySelector('.tag.active[data-val^="v"]')?.dataset.val || 'v4',
      genre: document.getElementById('genre').value,
      bpm: document.getElementById('bpm').value,
      description: document.getElementById('refDesc').value
    },
    userApiKey: userKey
  };

  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const result = await response.json();
    showAd(() => {
      document.getElementById('promptText').textContent = result.stylePrompt;
      document.getElementById('outputWrapper').style.display = 'block';
      if(!userKey) incUsed();
      updateBanner();
    });
  } catch (e) {
    alert("Errore generazione.");
  } finally {
    btn.disabled = false; btn.innerHTML = '▶ GENERA PROMPT SUNO';
  }
}

// Inizializzazione
document.getElementById('generateBtn').addEventListener('click', generate);
updateBanner();
</script>
